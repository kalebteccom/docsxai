# Netlify deploy for the docsxai documentation site (website/).
#
# The site is a static Astro + Starlight build, so no serverless adapter is
# needed - Netlify just builds and serves the static output. This repo is a
# pnpm workspace, so install/build run from the repo root (the default base)
# where the workspace and lockfile resolve; the command then builds only the
# website package.
#
# Netlify auto-detects pnpm from pnpm-lock.yaml and runs the install itself.

[build]
  command = "pnpm --filter @docsxai/website rebuild esbuild sharp && pnpm --filter @docsxai/website build"
  publish = "website/dist"

[build.environment]
  # Node is locked to 26 in .nvmrc (read by nvm locally and by Netlify);
  # mirrored here explicitly for robustness — keep the two in sync. Astro 6
  # needs Node >= 22.12.0; the published engine/CLI packages still run on
  # Node 20, so this lock is build/dev-only.
  NODE_VERSION = "26"
  # The lockfile is written by pnpm 10.x, and the repo root package.json has no
  # `packageManager` field to pin the version, so pin pnpm 10 here to make sure
  # Netlify reads the pnpm-10 lockfile correctly.
  PNPM_VERSION = "10"
  # The repo's .npmrc sets ignore-scripts=true as a supply-chain guard, so the
  # Astro toolchain's native binaries are not compiled on install. The
  # `pnpm rebuild esbuild sharp` step in the build command compiles the two the
  # build actually needs.

# Content-hashed assets never change - cache them for a year.
[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Baseline security headers for every response.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
